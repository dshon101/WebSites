<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Cryptography Study Guide</title>
<link href="https://fonts.googleapis.com/css2?family=DM+Mono:wght@400;500&family=Lora:ital,wght@0,400;0,600;1,400&family=Syne:wght@400;600;700;800&display=swap" rel="stylesheet">
<style>
:root {
  --bg: #0d0f14;
  --surface: #13161e;
  --surface2: #1a1d28;
  --border: #252836;
  --border2: #2e3245;
  --accent: #4f8ef7;
  --accent2: #7c5af0;
  --accent3: #2dd4b6;
  --text: #e8eaf2;
  --text2: #9097b8;
  --text3: #5a6080;
  --tag-bg: #1e2235;
  --correct: #2dd4b6;
  --incorrect: #f76f6f;
  --warning: #f5a623;
}

* { box-sizing: border-box; margin: 0; padding: 0; }
html { scroll-behavior: smooth; }

body {
  background: var(--bg);
  color: var(--text);
  font-family: 'Lora', Georgia, serif;
  font-size: 16px;
  line-height: 1.7;
  min-height: 100vh;
}

/* GRID LAYOUT */
.layout {
  display: grid;
  grid-template-columns: 260px 1fr;
  min-height: 100vh;
}

/* SIDEBAR */
.sidebar {
  background: var(--surface);
  border-right: 1px solid var(--border);
  position: sticky;
  top: 0;
  height: 100vh;
  overflow-y: auto;
  display: flex;
  flex-direction: column;
}

.sidebar-header {
  padding: 28px 20px 20px;
  border-bottom: 1px solid var(--border);
}

.sidebar-logo {
  font-family: 'Syne', sans-serif;
  font-weight: 800;
  font-size: 13px;
  letter-spacing: 0.15em;
  text-transform: uppercase;
  color: var(--accent);
  margin-bottom: 4px;
}

.sidebar-title {
  font-family: 'Syne', sans-serif;
  font-weight: 700;
  font-size: 18px;
  color: var(--text);
  line-height: 1.2;
}

.sidebar-sub {
  font-family: 'DM Mono', monospace;
  font-size: 11px;
  color: var(--text3);
  margin-top: 6px;
}

.view-switcher {
  padding: 14px 20px;
  border-bottom: 1px solid var(--border);
  display: flex;
  gap: 6px;
}

.vsw-btn {
  flex: 1;
  background: transparent;
  border: 1px solid var(--border2);
  color: var(--text2);
  font-family: 'DM Mono', monospace;
  font-size: 10px;
  letter-spacing: 0.05em;
  text-transform: uppercase;
  padding: 6px 4px;
  border-radius: 6px;
  cursor: pointer;
  transition: all 0.18s;
}
.vsw-btn:hover { border-color: var(--accent); color: var(--accent); }
.vsw-btn.active { background: var(--accent); border-color: var(--accent); color: #fff; }

.nav-list {
  list-style: none;
  padding: 10px 0;
  flex: 1;
}

.nav-item {
  display: flex;
  align-items: center;
  gap: 10px;
  padding: 9px 20px;
  cursor: pointer;
  transition: all 0.15s;
  border-left: 3px solid transparent;
}
.nav-item:hover { background: var(--surface2); }
.nav-item.active { background: var(--surface2); border-left-color: var(--accent); }
.nav-item.active .nav-num { color: var(--accent); }
.nav-item.active .nav-name { color: var(--text); }

.nav-num {
  font-family: 'DM Mono', monospace;
  font-size: 10px;
  color: var(--text3);
  min-width: 18px;
}

.nav-name {
  font-family: 'Syne', sans-serif;
  font-size: 12px;
  font-weight: 600;
  color: var(--text2);
  line-height: 1.3;
}

/* MAIN */
.main {
  overflow-y: auto;
  background: var(--bg);
}

/* HERO */
.hero {
  background: var(--surface);
  border-bottom: 1px solid var(--border);
  padding: 48px 56px 40px;
  position: relative;
  overflow: hidden;
}

.hero::before {
  content: '';
  position: absolute;
  top: -60px; right: -60px;
  width: 300px; height: 300px;
  background: radial-gradient(circle, rgba(79,142,247,0.08) 0%, transparent 70%);
  border-radius: 50%;
}

.hero-eyebrow {
  font-family: 'DM Mono', monospace;
  font-size: 11px;
  letter-spacing: 0.12em;
  text-transform: uppercase;
  color: var(--accent);
  margin-bottom: 12px;
}

.hero-heading {
  font-family: 'Syne', sans-serif;
  font-weight: 800;
  font-size: 38px;
  line-height: 1.1;
  color: var(--text);
  margin-bottom: 14px;
}

.hero-heading span { color: var(--accent); }

.hero-desc {
  color: var(--text2);
  font-size: 15px;
  max-width: 580px;
  line-height: 1.65;
  margin-bottom: 24px;
}

.hero-tags {
  display: flex;
  gap: 8px;
  flex-wrap: wrap;
}

.hero-tag {
  background: var(--tag-bg);
  border: 1px solid var(--border2);
  color: var(--text2);
  font-family: 'DM Mono', monospace;
  font-size: 11px;
  padding: 4px 12px;
  border-radius: 20px;
}

/* CONTENT AREA */
.content-area {
  padding: 40px 56px 80px;
}

.topic-header {
  margin-bottom: 32px;
  padding-bottom: 20px;
  border-bottom: 1px solid var(--border);
}

.topic-num {
  font-family: 'DM Mono', monospace;
  font-size: 11px;
  color: var(--accent);
  letter-spacing: 0.1em;
  text-transform: uppercase;
  margin-bottom: 8px;
}

.topic-title {
  font-family: 'Syne', sans-serif;
  font-weight: 800;
  font-size: 28px;
  color: var(--text);
  margin-bottom: 8px;
}

.topic-subtitle {
  font-family: 'DM Mono', monospace;
  font-size: 12px;
  color: var(--text3);
}

/* NOTES VIEW */
.note-block {
  margin-bottom: 20px;
  border: 1px solid var(--border);
  border-radius: 10px;
  overflow: hidden;
}

.note-block-header {
  background: var(--surface);
  padding: 12px 18px;
  font-family: 'Syne', sans-serif;
  font-size: 13px;
  font-weight: 700;
  color: var(--accent);
  letter-spacing: 0.04em;
  cursor: pointer;
  display: flex;
  justify-content: space-between;
  align-items: center;
  user-select: none;
  transition: background 0.15s;
}
.note-block-header:hover { background: var(--surface2); }

.nbh-arrow {
  font-size: 10px;
  color: var(--text3);
  transition: transform 0.2s;
}
.note-block.open .nbh-arrow { transform: rotate(180deg); }

.note-block-body {
  display: none;
  padding: 16px 18px;
  font-size: 15px;
  color: var(--text2);
  line-height: 1.7;
  background: var(--bg);
  border-top: 1px solid var(--border);
}
.note-block.open .note-block-body { display: block; }

.note-block-body ul { padding-left: 20px; }
.note-block-body li { margin-bottom: 6px; }

.summary-strip {
  background: linear-gradient(135deg, rgba(79,142,247,0.08), rgba(124,90,240,0.08));
  border: 1px solid rgba(79,142,247,0.25);
  border-radius: 10px;
  padding: 16px 20px;
  margin-top: 24px;
  font-size: 14px;
  color: var(--text2);
  line-height: 1.65;
}
.summary-strip strong { color: var(--accent3); font-style: normal; }

/* Q&A VIEW */
.qa-card {
  border: 1px solid var(--border);
  border-radius: 10px;
  margin-bottom: 14px;
  overflow: hidden;
  transition: border-color 0.2s;
}
.qa-card:hover { border-color: var(--border2); }
.qa-card.revealed { border-color: rgba(79,142,247,0.3); }

.qa-question {
  padding: 16px 20px;
  background: var(--surface);
  cursor: pointer;
  display: flex;
  gap: 14px;
  align-items: flex-start;
  user-select: none;
}
.qa-question:hover { background: var(--surface2); }

.qa-qnum {
  font-family: 'DM Mono', monospace;
  font-size: 11px;
  color: var(--accent);
  min-width: 24px;
  padding-top: 2px;
}

.qa-qtext {
  font-family: 'Syne', sans-serif;
  font-size: 14px;
  font-weight: 600;
  color: var(--text);
  line-height: 1.45;
  flex: 1;
}

.qa-reveal-hint {
  font-family: 'DM Mono', monospace;
  font-size: 10px;
  color: var(--text3);
  padding-top: 3px;
  white-space: nowrap;
}

.qa-answer {
  display: none;
  padding: 16px 20px 18px 58px;
  background: var(--bg);
  border-top: 1px solid var(--border);
  font-size: 14px;
  color: var(--text2);
  line-height: 1.7;
}
.qa-card.revealed .qa-answer { display: block; }
.qa-card.revealed .qa-reveal-hint { color: var(--accent3); }

.qa-answer code {
  font-family: 'DM Mono', monospace;
  font-size: 12px;
  background: var(--surface2);
  border: 1px solid var(--border);
  padding: 1px 6px;
  border-radius: 4px;
  color: var(--accent3);
}

/* SUMMARY VIEW */
.summary-grid {
  display: grid;
  grid-template-columns: 1fr 1fr;
  gap: 14px;
  margin-bottom: 24px;
}

.sum-card {
  background: var(--surface);
  border: 1px solid var(--border);
  border-radius: 10px;
  padding: 16px 18px;
}

.sum-card-label {
  font-family: 'DM Mono', monospace;
  font-size: 10px;
  text-transform: uppercase;
  letter-spacing: 0.1em;
  color: var(--accent);
  margin-bottom: 8px;
}

.sum-card-content {
  font-size: 13px;
  color: var(--text2);
  line-height: 1.6;
  font-family: 'DM Mono', monospace;
}

/* WELCOME */
.welcome {
  padding: 40px 56px 80px;
}

.welcome-grid {
  display: grid;
  grid-template-columns: repeat(auto-fill, minmax(220px, 1fr));
  gap: 12px;
  margin: 28px 0;
}

.welcome-card {
  background: var(--surface);
  border: 1px solid var(--border);
  border-radius: 10px;
  padding: 18px;
  cursor: pointer;
  transition: all 0.18s;
}
.welcome-card:hover {
  border-color: var(--accent);
  transform: translateY(-2px);
}

.wc-num {
  font-family: 'DM Mono', monospace;
  font-size: 10px;
  color: var(--accent);
  margin-bottom: 6px;
}

.wc-title {
  font-family: 'Syne', sans-serif;
  font-weight: 700;
  font-size: 13px;
  color: var(--text);
  line-height: 1.3;
}

/* Utility */
.mono { font-family: 'DM Mono', monospace; }
.hidden { display: none !important; }

/* scrollbar */
::-webkit-scrollbar { width: 6px; }
::-webkit-scrollbar-track { background: transparent; }
::-webkit-scrollbar-thumb { background: var(--border2); border-radius: 3px; }

@media (max-width: 900px) {
  .layout { grid-template-columns: 1fr; }
  .sidebar { position: relative; height: auto; }
  .hero, .content-area, .welcome { padding: 28px 24px; }
  .summary-grid { grid-template-columns: 1fr; }
  .hero-heading { font-size: 28px; }
}
</style>
</head>

      { title: "RSA Signature Process", body: "<strong>Signing</strong>: compute h=H(M), then sig=h^d mod n (private key d).<br><strong>Verification</strong>: compute h'=sig^e mod n (public key e), compute H(M), check h'==H(M).<br>Sign the <em>hash</em> of the message, not the message itself — handles arbitrary-length messages and is collision-resistant." },
      { title: "RSA-PSS vs PKCS#1 v1.5", body: "<strong>PKCS#1 v1.5</strong>: deterministic padding. Has known vulnerabilities (Bleichenbacher attack). Still widely deployed for compatibility. <strong>RSA-PSS</strong> (Probabilistic Signature Scheme): randomised padding with formal security proof. Recommended for all new implementations." },
      { title: "DSA (Digital Signature Algorithm)", body: "NIST standard (1991). Based on Discrete Log Problem. Signature = (r, s) pair. Requires a unique random k per signature. <strong>Critical flaw</strong>: reusing k for two different messages exposes the private key algebraically. Sony PS3 (2010): used a fixed k → entire signing key recovered." },
      { title: "ECDSA and Modern Signatures", body: "<strong>ECDSA</strong>: DSA on elliptic curves. Smaller keys (256-bit = 128-bit security). Used in Bitcoin (transaction signing) and TLS certificates. <strong>EdDSA/Ed25519</strong>: modern alternative, deterministic (no random k required — k derived from private key + message). Used in SSH, Signal, modern TLS." }
    ],
    summary: "Digital signatures: sign with private key, verify with public key. Provide authentication, integrity, and non-repudiation. RSA-PSS is the modern standard; ECDSA/Ed25519 for efficiency. NEVER reuse k in DSA/ECDSA — it exposes the private key (Sony PS3 hack).",
    sumCards: [
      { label: "Three properties", content: "Authentication · Integrity · Non-repudiation" },
      { label: "RSA signature", content: "Sign: H(M)ᵈ mod n · Verify: sigᵉ mod n == H(M)" },
      { label: "DSA", content: "(r,s) pair · DLP-based · NEVER reuse k!" },
      { label: "Modern", content: "ECDSA: TLS/Bitcoin · Ed25519: SSH/Signal (deterministic k)" }
    ],
    qa: [
      { q: "Why do we sign the hash of a message rather than the message itself?", a: "1) RSA can only sign data smaller than the key size (e.g., 2048 bits). A document can be megabytes long. 2) Hashing gives a fixed-size 256-bit digest for any message length. 3) If H is collision-resistant, signing H(M) is as secure as signing M — a forger would need to find a hash collision to produce a different document with the same signature." },
      { q: "You receive a document signed with Alice's private key. What three things can you verify?", a: "1) Authentication: only Alice holds her private key, so only she could have produced sig=H(M)^d mod n. 2) Integrity: recomputing H(M) and comparing with sig^e mod n confirms no byte was altered since signing. 3) Non-repudiation: Alice cannot deny signing — her private key (under her exclusive control) is the only way to produce a valid signature." },
      { q: "The Sony PS3 used a fixed k in ECDSA. Explain mathematically why this exposed the private key.", a: "ECDSA signature: s=k^{-1}(H(M)+x·r) mod q. With the same k for two messages M1, M2: s1-s2=k^{-1}(H(M1)-H(M2)). So k=(H(M1)-H(M2))/(s1-s2) mod q. Then x=(s1·k-H(M1))/r mod q. All values on the right are publicly known. The private key x is fully exposed from just two signatures." },
      { q: "Compare RSA-PSS and ECDSA. Which would you recommend for a new TLS certificate?", a: "RSA-PSS: large keys (2048-4096 bits), well-understood, widely compatible. ECDSA: small keys (256-bit = 128-bit security), fast signing/verification, preferred in TLS 1.3. Recommendation: ECDSA P-256 for performance-sensitive applications, or Ed25519 (EdDSA) for maximum security with deterministic signatures. RSA-PSS-2048 for maximum legacy compatibility." },
      { q: "What is a signature replay attack and how do protocols prevent it?", a: "An attacker captures a valid signed message (e.g., a signed payment of £100) and re-submits it later to execute the same transaction again. Prevention: include a timestamp, nonce, or sequence number inside the signed message content. The signature covers the nonce, so an old signature is invalid for any new session with a different nonce." }
    ]
  },
  {
    short: "Authentication Protocols",
    subtitle: "11.1 Challenge-Response · 11.2 Kerberos · 11.3 X.509 Certificates",
    notes: [
      { title: "Challenge-Response Authentication", body: "Server sends a random nonce (challenge). Client must respond with a value proving knowledge of the secret without transmitting the secret itself. Example: response = H(password ∥ nonce). Prevents: (1) eavesdropping (secret never sent), (2) replay attacks (nonce is unique each session)." },
      { title: "Kerberos Architecture", body: "<strong>Components</strong>: KDC (Key Distribution Centre) = AS + TGS.<br><strong>Flow</strong>: 1) Client → AS: request TGT. 2) AS → Client: TGT encrypted with KDC key. 3) Client → TGS: present TGT + service request. 4) TGS → Client: service ticket. 5) Client → Service: present ticket. 6) Service grants access.<br>Used in Windows Active Directory (enterprise authentication)." },
      { title: "X.509 Certificates", body: "Standard format for public key certificates. Binds a public key to an identity, signed by a Certificate Authority (CA). Fields: <strong>Subject</strong> (identity), <strong>Issuer</strong> (CA name), <strong>Public Key</strong>, <strong>Validity Period</strong> (not before/not after), <strong>Serial Number</strong>, <strong>Subject Alternative Names</strong> (SANs — domain names), <strong>CA Signature</strong>." },
      { title: "Mutual Authentication", body: "Both parties authenticate each other. TLS mutual authentication: server presents certificate (always), client optionally presents certificate too. Prevents impersonation from either side. Used in enterprise systems, banking APIs, and high-security microservice architectures." },
      { title: "Why Kerberos Uses Symmetric Crypto", body: "Kerberos was designed in 1988 for efficiency. Symmetric operations (AES) are thousands of times faster than asymmetric (RSA). Since the KDC shares secret keys with every principal, symmetric crypto is sufficient for all ticket encryption. Centralised authentication also simplifies key management." }
    ],
    summary: "Challenge-response proves knowledge without revealing secrets (nonce prevents replay). Kerberos provides SSO via a trusted KDC (AS+TGS). X.509 certificates bind public keys to identities, enabling the TLS trust chain. Mutual authentication verifies both parties.",
    sumCards: [
      { label: "Challenge-response", content: "Server: nonce N · Client: H(secret‖N) · Never sends secret" },
      { label: "Kerberos flow", content: "AS → TGT → TGS → Service Ticket → Service" },
      { label: "X.509 fields", content: "Subject · Issuer · Public Key · Validity · SAN · CA Signature" },
      { label: "Used in", content: "Kerberos: Windows AD · X.509: TLS/HTTPS/Code signing" }
    ],
    qa: [
      { q: "Design a simple challenge-response protocol. What prevents replay attacks?", a: "1) Client → Server: username. 2) Server → Client: random nonce N. 3) Client → Server: R=H(password ∥ N). 4) Server computes H(stored_hash ∥ N) and compares with R. Replay prevention: each session uses a fresh random N. A captured R from session 1 is useless in session 2 because N has changed and R won't match." },
      { q: "Describe the Kerberos ticket flow in order. Why is it called single sign-on?", a: "1) Client authenticates to AS → receives TGT (encrypted, timestamped, valid for ~8h). 2) Client presents TGT to TGS → receives service-specific ticket. 3) Client presents ticket to desired service → access granted. SSO: the user authenticates once (step 1). TGT allows obtaining tickets for any service without re-entering credentials — one login, multiple services." },
      { q: "What is an X.509 certificate? List five fields and explain each.", a: "X.509 is a CA-signed document binding identity to public key. Fields: Subject (who cert belongs to — e.g., 'www.example.com'), Issuer (which CA signed it), Public Key (entity's public key for verification/encryption), Validity Period (not before/not after dates — limits exposure if key compromised), Serial Number (unique per CA — used for revocation), CA Signature (proves CA vouches for this binding)." },
      { q: "What attack is prevented by checking that a certificate's Subject matches the domain you're connecting to?", a: "Certificate substitution / MITM: without this check, an attacker with a valid certificate for evil.com could present it during your connection to bank.com. Since the browser doesn't verify the domain match, the fake certificate would appear 'valid'. The Common Name / Subject Alternative Name check ensures the certificate was issued for the specific domain you're visiting." },
      { q: "Why does Kerberos use symmetric cryptography internally rather than RSA?", a: "Kerberos was designed in 1988 when public-key operations were extremely slow. Symmetric operations (AES) remain thousands of times faster than asymmetric (RSA). Since the KDC shares a unique secret key with every registered principal, symmetric crypto fully covers all authentication needs. Public-key crypto is also more complex to implement correctly (certificates, revocation)." }
    ]
  },
  {
    short: "Public Key Infrastructure",
    subtitle: "12.1 Certificate Authorities · 12.2 Trust Models · 12.3 CRLs",
    notes: [
      { title: "Certificate Authorities (CAs)", body: "Trusted third parties that issue and digitally sign X.509 certificates. <strong>Hierarchy</strong>: Root CA → Intermediate CA → End-entity cert. Browsers ship with ~150 pre-trusted Root CAs (Mozilla, Google, Apple). Root CA keys are kept offline (air-gapped) — compromising a root would invalidate millions of certificates worldwide." },
      { title: "Trust Models", body: "<ul><li><strong>Hierarchical PKI</strong>: single root CA at top, trust delegated downward. Used in web PKI (HTTPS). Simple but centralised.</li><li><strong>Web of Trust (PGP)</strong>: decentralised, users sign each other's keys. No central authority. Trust is transitive. Used in OpenPGP email encryption.</li><li><strong>Cross-certification</strong>: two separate CA hierarchies mutually certify each other. Merges two PKI domains.</li></ul>" },
      { title: "Certificate Revocation", body: "<ul><li><strong>CRL</strong> (Certificate Revocation List): CA publishes a signed list of revoked serial numbers. Downloaded by clients. Can be stale (updated daily/weekly).</li><li><strong>OCSP</strong> (Online Certificate Status Protocol): real-time query to CA for cert status. Faster but CA sees which sites you visit.</li><li><strong>OCSP Stapling</strong>: server pre-fetches signed OCSP response, includes it in TLS handshake. Fast + privacy-preserving. Current best practice.</li></ul>" },
      { title: "Certificate Transparency (CT)", body: "Public append-only logs of all issued certificates. Browsers require CT proofs embedded in certificates (Google Chrome). Allows rapid detection of misissuance. Detected the 2015 Symantec unauthorised certificate issuance within days." },
      { title: "Certificate Pinning", body: "Application hard-codes the expected certificate or public key hash. Protects against MITM even if a trusted CA is compromised. Used in high-security mobile apps. Risk: if the server rotates its key, pinned apps break until updated. HPKP header (deprecated) attempted to do this for browsers." }
    ],
    summary: "PKI manages the lifecycle of digital certificates. CAs form a trust hierarchy (root → intermediate → end-entity). CRLs and OCSP handle revocation (OCSP Stapling is best). Trust models: hierarchical (web PKI) vs decentralised (PGP Web of Trust). Certificate Transparency provides public audit logs.",
    sumCards: [
      { label: "CA hierarchy", content: "Root CA → Intermediate CA → End-entity · ~150 browser roots" },
      { label: "Trust models", content: "Hierarchical (web) · Web of Trust (PGP) · Cross-certification" },
      { label: "Revocation", content: "CRL (stale) → OCSP (real-time) → OCSP Stapling (best)" },
      { label: "Pinning / CT", content: "Pinning: hard-coded cert hash · CT: public certificate audit log" }
    ],
    qa: [
      { q: "Explain the chain of trust from root CA to end-entity certificate. Why is the root CA kept offline?", a: "Root CA signs the Intermediate CA's certificate. Intermediate CA signs end-entity certificates (e.g., for www.example.com). Browser trusts root CA (pre-installed) → trust flows down: root→intermediate→end-entity. Root CA is offline (air-gapped) because if its private key is compromised, every certificate in its entire hierarchy becomes untrusted — an internet-wide catastrophe. Only intermediate CA keys are online for day-to-day signing." },
      { q: "What is a CRL and describe two of its limitations.", a: "A Certificate Revocation List is a CA-signed list of revoked certificate serial numbers that clients download. Limitations: 1) Staleness — CRLs are typically updated daily or weekly. A certificate revoked at 9am may still be trusted until the next CRL is published. 2) Soft-fail — many clients accept certificates even if the CRL server is unreachable, meaning attackers can block CRL access to keep revoked certs trusted." },
      { q: "Compare OCSP and OCSP Stapling. Which is better and why?", a: "Basic OCSP: client queries CA's OCSP server for each certificate. Problem: adds latency, CA learns which websites every user visits (privacy leak), OCSP server becomes a bottleneck/single point of failure. OCSP Stapling: web server pre-fetches the signed OCSP response and 'staples' it to the TLS handshake. Benefits: no CA privacy leak, no extra client round-trip, OCSP server unavailability doesn't break connections." },
      { q: "In 2011, DigiNotar was compromised. What was the real-world impact?", a: "Attackers who compromised DigiNotar (a Dutch CA) issued fraudulent certificates for google.com and other major domains. Iranian users connecting to Google were silently redirected to government-controlled servers presenting these fake-but-browser-trusted certificates. Users saw padlocks and no warnings. DigiNotar was removed from all major browser trust stores within weeks and declared bankrupt. Demonstrates the catastrophic impact of a CA compromise." },
      { q: "What is certificate pinning and what is its main operational risk?", a: "Certificate pinning hard-codes the expected certificate fingerprint or public key hash in an application. Even if a rogue CA issues a fake certificate for the server, the app rejects it because the hash doesn't match. Main risk: if the server renews its certificate or rotates its key (standard practice), the pinned app immediately rejects the new certificate and becomes non-functional — requiring an emergency app release to distribute new pins." }
    ]
  },
  {
    short: "Attacks on Cryptographic Systems",
    subtitle: "13.1 Brute-Force · 13.2 Replay · 13.3 Chosen-Plaintext/Ciphertext Attacks",
    notes: [
      { title: "Brute-Force Attacks", body: "Try every possible key until correct plaintext is found. Complexity: O(2^k) for k-bit key. <strong>Defence</strong>: large key sizes. AES-128 (2^128 keys) at 10^18 attempts/second takes longer than the age of the universe. 56-bit DES was broken; 128-bit AES is safe from brute force." },
      { title: "Replay Attacks", body: "Attacker captures a valid authentication message and retransmits it later to gain unauthorised access. Example: replay a captured TLS session token or Kerberos ticket. <strong>Defence</strong>: nonces (numbers used once), timestamps, sequence numbers — ensure each authentication transaction is unique and time-limited." },
      { title: "Chosen-Plaintext Attack (CPA)", body: "Attacker can obtain ciphertexts for arbitrary plaintexts of their choice. Realistic in many settings: HTTPS servers, email encryption. Goal: determine the key or decrypt unknown ciphertexts. Modern ciphers must achieve <strong>IND-CPA</strong> (semantic security) — attacker cannot distinguish encryptions of two messages." },
      { title: "Chosen-Ciphertext Attack (CCA)", body: "Attacker can also query a decryption oracle for chosen ciphertexts (except the target). <strong>CCA2 (adaptive)</strong>: can query decryption oracle even after seeing the target ciphertext. <strong>IND-CCA2</strong> is the strongest standard security notion. RSA-OAEP achieves IND-CCA2; RSA without padding does not." },
      { title: "Side-Channel and Other Attacks", body: "<ul><li><strong>MITM</strong>: intercept and modify unauthenticated DH exchanges.</li><li><strong>Timing attacks</strong>: measure execution time to extract key bits (Kocher 1996 on RSA).</li><li><strong>Power analysis</strong>: measure power consumption of smart card during AES.</li><li><strong>Birthday attack</strong>: find hash collisions in O(2^(n/2)).</li><li><strong>Padding oracle</strong>: exploit decryption error messages to decrypt byte-by-byte (POODLE on SSL3).</li></ul>" }
    ],
    summary: "Attacks range from brute-force to adaptive chosen-ciphertext. Nonces and timestamps prevent replay. IND-CPA and IND-CCA2 are formal security standards for modern ciphers. Side-channel attacks bypass mathematical security through physical implementation leaks. Every layer of cryptographic design has potential attack vectors.",
    sumCards: [
      { label: "Brute-force", content: "Try all 2^k keys · Defeated by large keys · AES-128: safe" },
      { label: "Replay", content: "Reuse captured message · Defence: nonces + timestamps" },
      { label: "CPA / CCA", content: "CPA: chosen plaintexts · CCA2: + decryption oracle · Strongest: IND-CCA2" },
      { label: "Side-channel", content: "Timing · Power · EM · Bypass math via implementation · POODLE padding oracle" }
    ],
    qa: [
      { q: "AES-256 has 2^256 keys. At 10^18 attempts/second, how long is a brute-force attack?", a: "2^256≈1.16×10^77 attempts. Average success at 2^255≈5.8×10^76. Time=5.8×10^76/10^18=5.8×10^58 seconds. Age of universe≈4×10^17 seconds. This attack would take 1.45×10^41 times longer than the age of the universe. Physically impossible." },
      { q: "Describe a chosen-plaintext attack. Which historical example used this technique against Enigma?", a: "In a CPA, the attacker chooses plaintexts and obtains their encryptions. At Bletchley Park, cryptanalysts used 'cribs' — guessing known plaintext (e.g., daily weather reports always started with 'WETTER' = weather). They encrypted their guesses through the Bombe machine and searched for Enigma configurations consistent with the observed ciphertext. This known/chosen-plaintext approach was central to breaking Enigma." },
      { q: "What is a padding oracle attack? How does it decrypt ciphertext byte-by-byte?", a: "A padding oracle reports whether decrypted CBC plaintext has valid PKCS#7 padding. An attacker modifies the second-to-last ciphertext block byte-by-byte. When the oracle says 'valid padding', the last plaintext byte is known from the XOR relationship. Repeat for each byte to decrypt the entire block without the key. POODLE (2014) exploited this in SSL 3.0, forcing TLS downgrades to exploit it." },
      { q: "What is a side-channel attack? Give two different types with real examples.", a: "Side-channel attacks exploit physical information leaked during computation rather than mathematical weaknesses. 1) Timing attack: Paul Kocher (1996) showed RSA implementations that don't use constant-time comparison leak private key bits through timing differences in the exponentiation. 2) Differential Power Analysis (DPA): measuring power consumption of a smart card during AES encryption correlates with the Hamming weight of intermediate values, allowing key byte extraction without ever breaking AES mathematically." },
      { q: "You are reviewing a login system with these flaws: (a) passwords stored as MD5, (b) same IV for all CBC encryptions, (c) session tokens sent over HTTP. Identify and fix each.", a: "(a) MD5 is broken and unsalted — use Argon2id or bcrypt with a unique random salt per user. This prevents rainbow tables and slows brute force. (b) Reusing IV in CBC means identical message prefixes produce identical ciphertext — generate a fresh cryptographically random IV for every encryption operation. (c) HTTP transmits in plaintext — session tokens can be stolen by any network observer. Use HTTPS (TLS 1.2+) for all sessions, and also set cookies to Secure + HttpOnly + SameSite." }
    ]
  }
];

let currentTopic = null;
let currentView = 'notes';

function buildNav() {
  const nav = document.getElementById('navList');
  nav.innerHTML = '';
  DATA.forEach((t, i) => {
    const li = document.createElement('li');
    li.className = 'nav-item';
    li.innerHTML = `<span class="nav-num">${String(i+1).padStart(2,'0')}</span><span class="nav-name">${t.short}</span>`;
    li.onclick = () => loadTopic(i);
    nav.appendChild(li);
  });
}

function setActiveNav(idx) {
  document.querySelectorAll('.nav-item').forEach((el, i) => {
    el.classList.toggle('active', i === idx);
  });
}

function setView(v, btn) {
  currentView = v;
  document.querySelectorAll('.vsw-btn').forEach(b => b.classList.remove('active'));
  btn.classList.add('active');
  if (currentTopic !== null) loadTopic(currentTopic);
  else showWelcome();
}

function loadTopic(idx) {
  currentTopic = idx;
  setActiveNav(idx);
  const t = DATA[idx];
  const main = document.getElementById('mainContent');

  let html = `
    <div class="hero">
      <div class="hero-eyebrow">Topic ${String(idx+1).padStart(2,'0')} of 13</div>
      <h1 class="hero-heading">${t.short.includes('Cryptography') || t.short.includes('Functions') || t.short.includes('Signatures') || t.short.includes('Protocols') || t.short.includes('Infrastructure') || t.short.includes('Attacks') ? '<span>' + t.short.split(' ')[0] + '</span> ' + t.short.split(' ').slice(1).join(' ') : '<span>' + t.short + '</span>'}</h1>
      <p class="hero-desc">${t.subtitle}</p>
    </div>
    <div class="content-area">
  `;

  if (currentView === 'notes') {
    t.notes.forEach((n, ni) => {
      html += `
        <div class="note-block" id="nb-${idx}-${ni}">
          <div class="note-block-header" onclick="toggleNote('nb-${idx}-${ni}')">
            <span>${n.title}</span>
            <span class="nbh-arrow">▼</span>
          </div>
          <div class="note-block-body">${n.body}</div>
        </div>
      `;
    });
    html += `<div class="summary-strip"><strong>Summary:</strong> ${t.summary}</div>`;
  } else if (currentView === 'qa') {
    html += `<p style="font-family:'DM Mono',monospace;font-size:12px;color:var(--text3);margin-bottom:20px;">Click any question to reveal the answer.</p>`;
    t.qa.forEach((item, qi) => {
      html += `
        <div class="qa-card" id="qa-${idx}-${qi}">
          <div class="qa-question" onclick="toggleQA('qa-${idx}-${qi}')">
            <span class="qa-qnum">Q${qi+1}</span>
            <span class="qa-qtext">${item.q}</span>
            <span class="qa-reveal-hint">reveal ▾</span>
          </div>
          <div class="qa-answer">${item.a}</div>
        </div>
      `;
    });
  } else {
    html += `<div class="summary-grid">`;
    t.sumCards.forEach(card => {
      html += `
        <div class="sum-card">
          <div class="sum-card-label">${card.label}</div>
          <div class="sum-card-content">${card.content}</div>
        </div>
      `;
    });
    html += `</div>`;
    html += `<div class="summary-strip"><strong>One-line summary:</strong> ${t.summary}</div>`;
  }

  html += `</div>`;
  main.innerHTML = html;
  main.scrollTop = 0;
}

function toggleNote(id) {
  const el = document.getElementById(id);
  el.classList.toggle('open');
}

function toggleQA(id) {
  const el = document.getElementById(id);
  el.classList.toggle('revealed');
}

function showWelcome() {
  const main = document.getElementById('mainContent');
  let html = `
    <div class="hero">
      <div class="hero-eyebrow">Complete Study Resource</div>
      <h1 class="hero-heading"><span>Cryptography</span> Study Guide</h1>
      <p class="hero-desc">13 topics from classical ciphers to modern attacks. Use the sidebar to navigate topics, and toggle between Notes, Q&A flashcards, and Summary cards.</p>
      <div class="hero-tags">
        <span class="hero-tag">13 Topics</span>
        <span class="hero-tag">65 Q&amp;A Pairs</span>
        <span class="hero-tag">Short Notes</span>
        <span class="hero-tag">Summary Cards</span>
      </div>
    </div>
    <div class="welcome">
      <div style="font-family:'Syne',sans-serif;font-size:13px;font-weight:700;color:var(--text2);text-transform:uppercase;letter-spacing:0.08em;margin-bottom:16px;">All Topics</div>
      <div class="welcome-grid">
  `;
  DATA.forEach((t, i) => {
    html += `
      <div class="welcome-card" onclick="loadTopic(${i})">
        <div class="wc-num">${String(i+1).padStart(2,'0')}</div>
        <div class="wc-title">${t.short}</div>
      </div>
    `;
  });
  html += `</div></div>`;
  main.innerHTML = html;
}

buildNav();
showWelcome();
</script>
</body>
